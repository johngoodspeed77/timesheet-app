services:
  timesheet-app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    ports:
      - "${TIMESHEET_PORT:-5180}:5180"
    environment:
      TIMESHEET_PORT: "5180"
      SDB_PUBLIC_URL: ${SDB_PUBLIC_URL:-https://supadupabase.whitelynx.co.nz}
      SDB_AUTH_URL: ${SDB_AUTH_URL:-}
      SDB_DATA_URL: ${SDB_DATA_URL:-}
      SDB_MAIL_URL: ${SDB_MAIL_URL:-}
      SDB_PROXY: ${SDB_PROXY:-0}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      SDK_DIR: /app/sdk

  deploy-hook:
    profiles: ["remote"]
    build:
      context: ..
      dockerfile: infra/Dockerfile.deploy-hook
    restart: unless-stopped
    user: "1000:124"
    ports:
      - "${DEPLOY_HOOK_PORT:-5189}:5189"
    environment:
      DEPLOY_HOOK_SECRET: ${DEPLOY_HOOK_SECRET:-}
      DEPLOY_HOOK_PORT: "5189"
      REPO_ROOT: /repo
    volumes:
      - ..:/repo
      - /var/run/docker.sock:/var/run/docker.sock
