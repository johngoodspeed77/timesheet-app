services:
  timesheet-app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    ports:
      - "${TIMESHEET_PORT:-5180}:5180"
    environment:
      TIMESHEET_PORT: "5180"
      SDB_PUBLIC_URL: ${SDB_PUBLIC_URL:-http://192.168.1.19}
      SDB_AUTH_URL: ${SDB_AUTH_URL:-}
      SDB_DATA_URL: ${SDB_DATA_URL:-}
      SDB_MAIL_URL: ${SDB_MAIL_URL:-}
      SDK_DIR: /app/sdk
